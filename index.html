<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Opoweb | Temario y test de oposiciones</title>
  <meta name="description" content="Plataforma personal de temario, test y simulacros de oposiciones" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <button class="icon-btn close" id="closeSidebar" aria-label="Cerrar menú">×</button>
        <div class="logo">OP</div>
        <div><strong>Opoweb</strong><span>Temario + test</span></div>
      </div>
      <label class="field-label" for="oposicionSelect">Oposición activa</label>
      <select id="oposicionSelect" class="select"></select>
      <div class="oposicion-card" id="oposicionCard"></div>
      <nav class="menu" aria-label="Navegación principal">
        <button data-view="proceso">Proceso y enlaces</button>
        <button data-view="temario" class="active">Temario</button>
        <button data-view="normas">Normas</button>
        <button data-view="tests">Test por temas</button>
        <button data-view="supuestos">Supuestos prácticos</button>
        <button data-view="simulacros">Simulacros</button>
        <button data-view="progreso">Progreso</button>
      </nav>
      <div class="sidebar-note"><strong>Temas comunes</strong><p>Los temas marcados como comunes se podrán reutilizar en otras OPE.</p></div>
    </aside>
    <main class="main">
      <header class="topbar">
        <button class="icon-btn" id="openSidebar" aria-label="Abrir menú">☰</button>
        <div class="titlebox"><h1 id="viewTitle">Temario</h1><p id="viewSubtitle">Estudia, haz test y guarda tu progreso.</p></div>
        <div class="top-actions">
          <input id="searchInput" class="search" type="search" placeholder="Buscar tema, ley o concepto…" />
          <button class="btn ghost" id="exportProgress">Exportar</button>
          <label class="btn ghost file-label">Importar<input type="file" id="importProgress" accept="application/json" hidden></label>
        </div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>
  <script src="data/oposiciones.js"></script>
  <script src="data/proceso.js"></script>
  <script src="data/uc3m.js"></script>
  <script src="data/normas/constitucion.js"></script>
  <script src="data/normas/ley-39-2015.js"></script>
  <script src="data/normas/ley-39-2015-procedimiento.js"></script>
  <script src="data/normas/ley-40-2015.js"></script>
  <script src="data/normas/regimen-local.js"></script>
  <script src="data/normas/hacienda-local.js"></script>
  <script src="data/normas/contratos-publicos.js"></script>
  <script src="data/normas/empleo-publico.js"></script>
  <script src="data/normas/transversales.js"></script>
  <script src="data/normas/informatica.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/metodo-opotest.js"></script>
  <script src="assets/js/motor-temario.js"></script>
  <script src="assets/js/auditoria-temas.js"></script>
  <script src="assets/js/mapa-temas.js"></script>
  <script src="assets/js/uc3m-temario-v30.js"></script>
  <script src="assets/js/ui-v29.js"></script>
  <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(() => {}); }</script>
</body>
</html>
