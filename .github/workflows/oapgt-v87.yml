name: Diputación y fuentes OAPGT v0.87

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-gate:
    name: Bloqueo de contenido estatutario no verificado
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validate official-source gate
        run: |
          node --check data/oapgt-fuentes-v87.js
          node --check tests/oapgt-fuentes-v87.js
          node tests/oapgt-fuentes-v87.js
      - uses: actions/upload-artifact@v4
        with:
          name: oapgt-fuentes-v87
          path: oapgt-fuentes-v87.json
          retention-days: 30

  diputacion-theory:
    name: Diputación temas 25 a 34 · teoría y bancos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Check syntax
        run: |
          node --check assets/js/diputacion-teoria-v87-bloque1.js
          node --check assets/js/diputacion-teoria-v87-bloque2.js
          node --check assets/js/diputacion-test-v87-bloque2.js
          node --check assets/js/diputacion-teoria-v87-bloque3.js
          node --check assets/js/diputacion-test-v87-bloque3.js
          node --check tests/diputacion-v87-diagnostico.js
          node --check tests/diputacion-teoria-v87-bloque1.js
          node --check tests/diputacion-teoria-v87-bloque2.js
          node --check tests/diputacion-teoria-v87-bloque3.js
      - name: Generate diagnostic
        run: node tests/diputacion-v87-diagnostico.js
      - name: Validate autonomous theory blocks
        run: |
          node tests/diputacion-teoria-v87-bloque1.js
          node tests/diputacion-teoria-v87-bloque2.js
          node tests/diputacion-teoria-v87-bloque3.js
      - name: Upload theory reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diputacion-teoria-v87
          path: |
            diputacion-v87-diagnostico.json
            diputacion-teoria-v87-bloque1.json
            diputacion-teoria-v87-bloque2.json
            diputacion-teoria-v87-bloque3.json
          if-no-files-found: ignore
          retention-days: 30
