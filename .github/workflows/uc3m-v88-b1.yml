name: UC3M teoría v88 bloque 1

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  uc3m-theory-b1:
    name: UC3M · temas 13 y 14
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check syntax
        run: |
          node --check assets/js/uc3m-teoria-v88-bloque1a.js
          node --check assets/js/uc3m-teoria-v88-bloque1b.js
          node --check tests/uc3m-teoria-v88-bloque1.js
      - name: Validate editorial theory
        run: node tests/uc3m-teoria-v88-bloque1.js
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uc3m-teoria-v88-bloque1
          path: uc3m-teoria-v88-bloque1.json
          if-no-files-found: ignore
          retention-days: 30
