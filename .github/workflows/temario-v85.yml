name: Auditoría de temario v0.85

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  temario-depth:
    name: Carranque 20/20 · teoría autosuficiente
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check syntax
        run: |
          node --check assets/js/carranque-teoria-v85-bloque1.js
          node --check assets/js/carranque-teoria-v85-estructura.js
          node --check assets/js/carranque-teoria-v85-bloque2.js
          node --check assets/js/carranque-teoria-v85-bloque3.js
          node --check assets/js/carranque-teoria-v85-bloque4.js
          node --check tests/carranque-teoria-v85-bloque1.js
          node --check tests/carranque-teoria-v85-bloque2.js
          node --check tests/carranque-teoria-v85-bloque3.js
          node --check tests/carranque-teoria-v85-bloque4.js
          node --check tests/carranque-teoria-v85-diagnostico.js
          node --check tests/temario-depth-v85-final.js
      - name: Generate diagnostic metrics
        run: node tests/carranque-teoria-v85-diagnostico.js
      - name: Validate Carranque autonomous theory block 1
        run: node tests/carranque-teoria-v85-bloque1.js
      - name: Validate Carranque autonomous theory block 2
        run: node tests/carranque-teoria-v85-bloque2.js
      - name: Validate Carranque autonomous theory block 3
        run: node tests/carranque-teoria-v85-bloque3.js
      - name: Validate Carranque autonomous theory block 4
        run: node tests/carranque-teoria-v85-bloque4.js
      - name: Generate final theory audit
        run: node tests/temario-depth-v85-final.js
      - name: Show summary
        run: cat temario-depth-v85.md
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: temario-depth-v85
          path: |
            carranque-v85-diagnostico.json
            carranque-teoria-v85-bloque1.json
            carranque-teoria-v85-bloque2.json
            carranque-teoria-v85-bloque3.json
            carranque-teoria-v85-bloque4.json
            temario-depth-v85.json
            temario-depth-v85.md
          if-no-files-found: ignore
          retention-days: 30
