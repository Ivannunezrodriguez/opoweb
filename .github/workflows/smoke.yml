name: OpoWeb smoke tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check JavaScript syntax
        run: |
          node --check assets/js/diputacion-v56.js
          node --check assets/js/diputacion-v57.js
          node --check assets/js/diputacion-v58.js
          node --check assets/js/diputacion-v59.js
          node --check assets/js/diputacion-v60.js
          node --check assets/js/diputacion-v61.js
          node --check assets/js/diputacion-v62.js
          node --check assets/js/diputacion-v63.js
          node --check assets/js/diputacion-v64.js
          node --check assets/js/diputacion-v65.js
          node --check assets/js/uc3m-v66.js
          node --check assets/js/puebla-v67.js
          node --check assets/js/ui-v67.js
      - name: Run regression tests
        run: |
          node tests/smoke-v56.js
          node tests/smoke-v57.js
          node tests/smoke-v58.js
          node tests/smoke-v59.js
          node tests/smoke-v60.js
          node tests/smoke-v61.js
          node tests/smoke-v62.js
          node tests/smoke-v63.js
          node tests/smoke-v64.js
          node tests/smoke-v65.js
          node tests/smoke-uc3m-v66.js
          node tests/smoke-puebla-v67.js

  puebla-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Run integrated Puebla test
        run: node tests/smoke-puebla-live-v67.js
