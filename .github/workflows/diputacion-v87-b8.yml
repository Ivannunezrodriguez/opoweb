name: Diputación teoría v87 bloque 8

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diputacion-theory-b8:
    name: Diputación · temas 39 y 40
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check syntax
        run: |
          node --check assets/js/diputacion-teoria-v87-bloque8a.js
          node --check assets/js/diputacion-teoria-v87-bloque8b.js
          node --check assets/js/diputacion-teoria-v87-bloque8-preguntas.js
          node --check tests/diputacion-teoria-v87-bloque8.js
      - name: Validate theory, sources, banks and numbering
        run: node tests/diputacion-teoria-v87-bloque8.js
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diputacion-teoria-v87-bloque8
          path: diputacion-teoria-v87-bloque8.json
          if-no-files-found: ignore
          retention-days: 30
