name: Diputación teoría v87 bloque 3

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diputacion-theory-b3:
    name: Diputación · temas 29 y 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check syntax
        run: |
          node --check assets/js/diputacion-teoria-v87-bloque3.js
          node --check tests/diputacion-teoria-v87-bloque3.js
      - name: Validate theory and numbering
        run: node tests/diputacion-teoria-v87-bloque3.js
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diputacion-teoria-v87-bloque3
          path: diputacion-teoria-v87-bloque3.json
          if-no-files-found: ignore
          retention-days: 30
