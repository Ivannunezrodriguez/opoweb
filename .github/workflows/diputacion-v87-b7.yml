name: Diputación teoría v87 bloque 7

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diputacion-theory-b7:
    name: Diputación · temas 37 y 38
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check syntax
        run: |
          node --check assets/js/diputacion-teoria-v87-bloque7a.js
          node --check assets/js/diputacion-teoria-v87-bloque7b.js
          node --check assets/js/diputacion-teoria-v87-bloque7-preguntas.js
          node --check tests/diputacion-teoria-v87-bloque7.js
      - name: Validate theory, sources and numbering
        run: node tests/diputacion-teoria-v87-bloque7.js
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diputacion-teoria-v87-bloque7
          path: diputacion-teoria-v87-bloque7.json
          if-no-files-found: ignore
          retention-days: 30
